[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
test           = "test"
script         = "script"
solc           = "0.8.20"
optimizer      = true
optimizer_runs = 200
remappings     = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
celo_alfajores = "https://alfajores-forno.celo-testnet.org"
celo_mainnet   = "https://forno.celo.org"

[etherscan]
celo_alfajores = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api" }
celo_mainnet   = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }

[fmt]
line_length    = 100
tab_width      = 4
bracket_spacing = true
