[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
test           = "test"
script         = "script"
solc           = "0.8.20"
optimizer      = true
optimizer_runs = 200
remappings     = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
celo_sepolia = "https://forno.celo-sepolia.celo-testnet.org"
celo_mainnet   = "https://forno.celo.org"

[etherscan]
celo_sepolia = { key = "any", url = "https://celo-sepolia.blockscout.com/api/" }
celo_mainnet   = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }

[fmt]
line_length    = 100
tab_width      = 4
bracket_spacing = true
