name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Contracts — forge test
  # ──────────────────────────────────────────────
  contracts:
    name: Contracts (forge test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Cache Foundry dependencies
        uses: actions/cache@v4
        with:
          path: contracts/lib
          key: foundry-lib-${{ hashFiles('contracts/foundry.toml') }}
          restore-keys: foundry-lib-

      - name: Install contract dependencies
        working-directory: contracts
        run: |
          forge install OpenZeppelin/openzeppelin-contracts
          forge install foundry-rs/forge-std

      - name: Build contracts
        working-directory: contracts
        run: forge build --sizes

      - name: Run tests
        working-directory: contracts
        run: forge test -vvv

      - name: Check formatting
        working-directory: contracts
        run: forge fmt --check

      - name: Gas snapshot
        working-directory: contracts
        run: forge snapshot --no-match-test "Fuzz"

  # ──────────────────────────────────────────────
  # Frontend — next build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (next build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
          NEXT_PUBLIC_AJO_CIRCLE_ADDRESS: ${{ secrets.NEXT_PUBLIC_AJO_CIRCLE_ADDRESS }}
          NEXT_PUBLIC_G_DOLLAR_ADDRESS: ${{ secrets.NEXT_PUBLIC_G_DOLLAR_ADDRESS }}
